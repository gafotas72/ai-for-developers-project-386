name: e2e-tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build project
        run: ./gradlew build -x test -x checkstyleMain -x checkstyleTest

#      - name: Build frontend
#        run: cd frontend && npm install && npm run build
#
#      - name: Install Playwright browsers
#        run: cd e2e-tests && ../gradlew playwright --args="install"

      - name: Start backend
        run: |
          cd backend
          nohup ./gradlew bootJar > /tmp/backend.log 2>&1 &
          echo $!
        shell: bash

      - name: Wait for backend
        run: sleep 20

      - name: Start frontend
        run: |
          cd frontend
          nohup npm run preview -- --host --port 5173 > /tmp/frontend.log 2>&1 &
          echo $!
        shell: bash

      - name: Wait for frontend
        run: sleep 5

      - name: Run e2e tests
        run: cd e2e-tests && ../gradlew test
